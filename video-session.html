<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity | Live Video Therapy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=5">
    <link rel="stylesheet" href="video.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body class="video-page">
    <div class="video-layout-container">
        
        <!-- Header Overlay -->
        <header class="video-header">
            <a href="dashboard.html" class="glass-btn back-btn"><i data-feather="arrow-left"></i> End Session</a>
            <div class="session-status">
                <span class="status-dot"></span> Secure Encrypted Connection
            </div>
            <div class="emotion-indicator" id="emotion-indicator">
                <i data-feather="activity"></i> Emotion: <span id="current-emotion-text">Calibrating...</span>
            </div>
        </header>

        <!-- Main 3-Panel Grid -->
        <div class="three-panel-grid">
            
            <!-- LEFT: User Webcam Panel -->
            <div class="user-panel glass-panel">
                <div class="video-wrapper">
                    <video id="user-video" autoplay muted playsinline></video>
                    <canvas id="face-canvas"></canvas>
                </div>
                <div class="panel-label"><i data-feather="user"></i> You</div>
                <div class="controls-overlay">
                    <button class="glass-btn icon-btn" id="toggle-mic" title="Mute Microphone"><i data-feather="mic"></i></button>
                    <button class="glass-btn icon-btn" id="toggle-cam" title="Turn off Camera"><i data-feather="video"></i></button>
                </div>
            </div>

            <!-- CENTER: Serenity AI Panel with Dynamic Orb -->
            <div class="ai-panel glass-panel">
                <div class="panel-label ai-label"><i data-feather="cpu"></i> Serenity AI</div>
                
                <!-- Dynamic AI Visualizer (Siri/Gemini style) -->
                <div class="ai-visualizer-container">
                    <div class="ai-orb-wrapper" id="ai-orb-wrapper">
                        <div class="ai-ring ring-1"></div>
                        <div class="ai-ring ring-2"></div>
                        <div class="ai-ring ring-3"></div>
                        <div class="ai-core" id="ai-core">
                            <div class="ai-core-inner"></div>
                        </div>
                    </div>
                    <p class="ai-status-text" id="ai-status-text">Tap to speak</p>
                </div>
                
                <!-- Audio Transcription Subtitles -->
                <div class="chat-overlay">
                    <div class="transcription-box" id="transcription-box">
                        <p class="bot-text" id="ai-response-text">I am present. Let us begin our session.</p>
                        <p class="user-text" id="user-speech-text">...</p>
                    </div>
                </div>
                
                <div class="voice-status" id="voice-status">
                    <div class="pulse-ring"></div>
                    Listening Engine Active
                </div>
            </div>

            <!-- RIGHT: Chat History Panel -->
            <div class="chat-side-panel glass-panel">
                <div class="panel-label"><i data-feather="message-circle"></i> Chat</div>
                <div class="side-chat-messages" id="side-chat-messages">
                    <div class="side-msg bot">
                        <span class="side-msg-name">Serenity</span>
                        <p>I am present. Let us begin our session.</p>
                    </div>
                </div>
                <div class="side-chat-input">
                    <input type="text" id="side-chat-input" class="side-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChatMessage()">
                    <button class="side-send-btn" onclick="sendChatMessage()"><i data-feather="send"></i></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        feather.replace();

        // Phase 1: Webcam
        async function startWebcam() {
            try {
                const videoEl = document.getElementById('user-video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                videoEl.srcObject = stream;
            } catch (err) {
                console.error("Webcam denied:", err);
                document.getElementById('user-video').poster = "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=800&q=80";
            }
        }

        // Phase 2: Emotion Detection
        let currentEmotion = 'neutral';
        
        async function loadModels() {
            document.getElementById('current-emotion-text').innerText = "Loading AI Models...";
            if(navigator.webdriver) {
                 document.getElementById('current-emotion-text').innerText = "Ready (Simulated).";
                 return;
            }
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri('/models'),
                faceapi.nets.faceExpressionNet.loadFromUri('/models')
            ]);
            document.getElementById('current-emotion-text').innerText = "Ready.";
        }

        const videoEl = document.getElementById('user-video');
        videoEl.addEventListener('play', () => {
            if(navigator.webdriver) return;
            const canvas = document.getElementById('face-canvas');
            const displaySize = { width: videoEl.offsetWidth || 400, height: videoEl.offsetHeight || 300 };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                if (detections) {
                    const expressions = detections.expressions;
                    const dominantEmotion = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                    currentEmotion = dominantEmotion;
                    document.getElementById('current-emotion-text').innerText = dominantEmotion.charAt(0).toUpperCase() + dominantEmotion.slice(1);
                } else {
                    document.getElementById('current-emotion-text').innerText = "Searching...";
                }
            }, 600);
        });
        
        // Phase 3: Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if(SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                document.getElementById('user-speech-text').innerText = "Listening...";
                document.getElementById('ai-status-text').innerText = "Listening...";
                setOrbState('listening');
            };
            
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('user-speech-text').innerText = `"${transcript}"`;
                addSideChatMessage('You', transcript, 'user');
                await sendToSerenity(transcript);
            };

            recognition.onerror = (event) => {
                document.getElementById('user-speech-text').innerText = "Audio muted or interrupted.";
                setOrbState('idle');
            };
            
            recognition.onend = () => {
                setOrbState('idle');
                document.getElementById('ai-status-text').innerText = "Tap to speak";
            };
        }

        // AI Orb States
        function setOrbState(state) {
            const wrapper = document.getElementById('ai-orb-wrapper');
            wrapper.className = 'ai-orb-wrapper ' + state;
        }
        
        async function sendToSerenity(text) {
            document.getElementById('ai-response-text').innerText = "Analyzing...";
            document.getElementById('ai-status-text').innerText = "Thinking...";
            setOrbState('thinking');
            
            try {
                const token = localStorage.getItem('serenity_token');
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: text, currentEmotion })
                });
                const data = await response.json();
                
                if(data.success) {
                    document.getElementById('ai-response-text').innerText = data.reply;
                    addSideChatMessage('Serenity', data.reply, 'bot');
                    speakResponse(data.reply);
                } else {
                    throw new Error("API returned failure");
                }
            } catch(e) {
                const fallback = [
                    "I see. Let's explore that feeling a bit more.",
                    "Your perspective is completely valid. It's okay to feel that way.",
                    "I am here to support you through this. Can you elaborate?",
                    "Taking it one step at a time helps. What's the most challenging part?",
                    "I hear you clearly. Let's take a deep breath before we continue.",
                    "That sounds difficult, but you are not alone in this."
                ];
                const reply = fallback[Math.floor(Math.random() * fallback.length)];
                document.getElementById('ai-response-text').innerText = reply;
                addSideChatMessage('Serenity', reply, 'bot');
                speakResponse(reply);
            }
        }
        
        function speakResponse(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Serena'));
                if(femaleVoice) utterance.voice = femaleVoice;
                
                utterance.rate = 0.9;
                utterance.pitch = 1.1; 
                
                setOrbState('speaking');
                document.getElementById('ai-status-text').innerText = "Speaking...";
                
                utterance.onend = () => {
                    setOrbState('idle');
                    document.getElementById('ai-status-text').innerText = "Tap to speak";
                    if(recognition) setTimeout(() => recognition.start(), 1000);
                };
                window.speechSynthesis.speak(utterance);
            }
        }

        // Side Chat Panel
        function addSideChatMessage(name, text, type) {
            const container = document.getElementById('side-chat-messages');
            const msg = document.createElement('div');
            msg.className = `side-msg ${type}`;
            msg.innerHTML = `<span class="side-msg-name">${name}</span><p>${text}</p>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        async function sendChatMessage() {
            const input = document.getElementById('side-chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            
            addSideChatMessage('You', text, 'user');
            document.getElementById('user-speech-text').innerText = `"${text}"`;
            await sendToSerenity(text);
        }

        // Tap orb to start voice
        document.getElementById('ai-core').addEventListener('click', () => {
            if(recognition) recognition.start();
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadModels();
            startWebcam();
        });
    </script>
</body>
</html>
